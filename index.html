<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>For Lia</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- ensures mobile scaling -->
  <style>
    body {
      background: linear-gradient(to right, #ffdde1, #ee9ca7);
      font-family: 'Georgia', serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      color: #4a2c2a;
      flex-direction: column;
      margin: 0;
      padding: 10px;
    }
    #message {
      font-size: 18px;
      max-width: 95%;   /* fits on phone screens */
      white-space: pre-wrap; /* preserves line breaks */
      border: 2px solid #fff;
      padding: 15px;
      border-radius: 10px;
      background: rgba(255,255,255,0.85);
      display: none;
      margin: auto;
      line-height: 1.5;
    }
    button {
      padding: 12px 24px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background-color: #d16ba5;
      color: white;
      cursor: pointer;
    }
    button:hover {
      background-color: #c94f7c;
    }
    h1 {
      font-size: 22px;
      margin-bottom: 20px;
    }
    @media (max-width: 600px) {
      #message {
        font-size: 16px; /* smaller text for phones */
        padding: 12px;
      }
      h1 {
        font-size: 20px;
      }
      button {
        font-size: 14px;
        padding: 10px 20px;
      }
    }
  </style>
</head>
<body>
  <div id="intro">
    <h1>For My Dearest Lia</h1>
    <button onclick="playMusic()">Click to Begin</button>
  </div>
  <audio id="song" src="lia4.mp3"></audio>
  <div id="message"></div>

  <script>
    const text = `My dearest Lia,

I want you to know that my love for you runs deeper than words can capture. Even though you once turned me down in my pursuit of you, nothing has changed in my heart. Kahit na binusted mo ako sa panliligaw, hindi nagbago ang pagmamahal ko sa’yo. Sa bawat araw na lumilipas, sa bawat tibok ng puso ko, ikaw pa rin ang laman.

You are my one and only, the most important person to me. Like in the song “Sila”, you are the one I see, the one I feel, the one who makes life brighter just by existing. My love for you is endless, and I will wait patiently until the right time comes.

Because true love is not measured by acceptance alone—it is proven by the strength to remain, even when faced with rejection. And so I remain, steadfast and sincere, holding on to the hope that someday, when the moment is right, you will see how deeply I love you.

Always yours,
Mark`;

    function playMusic() {
      const song = document.getElementById("song");
      song.play();
      document.getElementById("intro").style.display = "none"; // hide heading and button
      setTimeout(showMessage, 23000); // 23 seconds delay
    }

    function showMessage() {
      const messageDiv = document.getElementById("message");
      messageDiv.style.display = "block";
      messageDiv.textContent = ""; // clear before typing
      typeWriter(text, messageDiv, 0);
    }

    function typeWriter(text, element, i) {
      if (i < text.length) {
        element.textContent += text.charAt(i);
        setTimeout(() => typeWriter(text, element, i + 1), 50);
      }
    }
  </script>
</body>
</html>
